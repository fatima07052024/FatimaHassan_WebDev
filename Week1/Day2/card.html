<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Card & Footer</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    background: #f4f4f4;
}

.main-heading {
    text-align: center;
    font-size: 24px;
    margin-top: 30px;
}

.pricing-container {
    display: flex;
    justify-content: center;
    margin: 50px 0;
}

.card {
    background: #fff;
    padding: 25px;
    width: 300px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    position: relative;
}

.badge {
    position: absolute;
    top: -10px;
    right: -10px;
    background: red;
    color: white;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 5px;
}

.card h2 {
    margin-bottom: 10px;
}

.price {
    font-size: 28px;
    font-weight: bold;
}

.price span {
    font-size: 14px;
    color: gray;
}

.card p {
    font-size: 14px;
    color: #666;
    margin: 15px 0;
}

.card button {
    background: linear-gradient(to right, #6a5acd, #7b68ee);
    border: none;
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
}

footer {
    background: #2c3e50;
    color: white;
    padding: 40px 20px;
}

.footer-container {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
}

.footer-column {
    width: 30%;
    min-width: 200px;
}

.footer-column h3 {
    margin-bottom: 15px;
}

.footer-column ul {
    list-style: none;
    padding: 0;
}

.footer-column ul li {
    margin-bottom: 10px;
}

.footer-column ul li a {
    color: white;
    text-decoration: none;
}

.footer-column input {
    padding: 8px;
    width: 70%;
    border: none;
    border-radius: 4px;
}

.footer-column button {
    padding: 8px 10px;
    border: none;
    background: #7b68ee;
    color: white;
    border-radius: 4px;
    cursor: pointer;
}
</style>

</head>
<body>


<div class="pricing-container">
    <div class="card">
        <div class="badge">50% OFF</div>
        <h2>Premium Plan</h2>
        <div class="price">$24.99 <span>/month</span></div>
        <p>
            Unlimited access to all features, priority support, and more.
        </p>
        <button>Subscribe Now</button>
    </div>
</div>

<footer>
    <div class="footer-container">

        <div class="footer-column">
            <h3>MyWebsite</h3>
            <p>A website to practice web development and explore new design possibilities</p>
        </div>

        <div class="footer-column">
            <h3>Quick Links</h3>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>

        <div class="footer-column">
            <h3>Newsletter</h3>
            <input type="email" placeholder="Enter email">
            <button>Subscribe</button>
        </div>

    </div>
</footer>

</body>
</html>
