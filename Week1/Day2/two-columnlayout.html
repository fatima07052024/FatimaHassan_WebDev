<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Two Column Layout</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .left {
      width: 50%;
    }

    .left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .right {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f4f4;
    }

    .form-box {
      background: white;
      padding: 30px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .form-box h2 {
      margin-bottom: 15px;
      font-size: 24px;
      color: #333;
    }

    .form-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;

      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .form-box button {
      width: 100%;
      padding: 12px;

      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;

      cursor: pointer;
    }

 @media (max-width: 768px) {

  .container {
    flex-direction: column;
    height: 100vh;
  }

  .left,
  .right {
    width: 100%;
    height: 50vh; 
  }

  .left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .right {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px; 
  }

  .form-box {
    width: 90%;
    padding: 20px;
  }
}
    
  </style>

</head>

<body>

  <div class="container">

    <div class="left">
      <img src="https://i.pinimg.com/736x/f5/e8/72/f5e87230f73c9811d9f9a69feb392b5a.jpg" alt="image">
    </div>

    <div class="right">
      <form class="form-box">
        <h2>Login</h2>

        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Password" required />

        <button type="submit">Submit</button>
      </form>
    </div>

  </div>

</body>
</html>
